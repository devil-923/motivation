<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grit & Consistency</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            text-align: center;
        }
        #container { max-width: 80%; padding: 40px; cursor: pointer; }
        h1 { font-size: 2.2rem; font-weight: 400; line-height: 1.6; }
        p { font-size: 1rem; color: #666666; text-transform: uppercase; letter-spacing: 0.2em; margin-top: 30px; }
        .fade-in { animation: fadeIn 0.8s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #status { position: fixed; bottom: 20px; font-size: 0.7rem; color: #333; }
    </style>
</head>
<body onclick="getQuote()">

    <div id="container">
        <h1 id="quote">Loading inspiration...</h1>
        <p id="author"></p>
    </div>

    <div id="status">Syncing...</div>

    <script>
        const localQuotes = [
            { q: "Discipline is the bridge between goals and accomplishment.", a: "Jim Rohn" },
            { q: "Success is the sum of small efforts, repeated day-in and day-out.", a: "Robert Collier" },
            { q: "Hard work beats talent when talent doesn't work hard.", a: "Tim Notke" }
        ];

        async function getQuote() {
            const quoteEl = document.getElementById('quote');
            const authorEl = document.getElementById('author');
            const statusEl = document.getElementById('status');

            try {
                // We use a different proxy service (corsproxy.io) which is currently very stable
                const response = await fetch('https://corsproxy.io/?' + encodeURIComponent('https://zenquotes.io/api/random'));
                
                if (!response.ok) throw new Error('Proxy error');
                
                const data = await response.json();
                const quoteData = data[0];

                if (quoteData && quoteData.q) {
                    displayQuote(quoteData.q, quoteData.a, "Live Stream");
                    return;
                }
            } catch (e) {
                console.error("Fetch failed:", e);
            }

            // Fallback
            const randomLocal = localQuotes[Math.floor(Math.random() * localQuotes.length)];
            displayQuote(randomLocal.q, randomLocal.a, "Offline Mode");
        }

        function displayQuote(q, a, source) {
            const container = document.getElementById('container');
            document.getElementById('quote').innerText = `"${q}"`;
            document.getElementById('author').innerText = `— ${a}`;
            document.getElementById('status').innerText = `Status: ${source}`;
            
            container.classList.remove('fade-in');
            void container.offsetWidth; 
            container.classList.add('fade-in');
        }

        window.onload = getQuote;
    </script>
</body>
</html>
