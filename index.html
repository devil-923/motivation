<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grit & Consistency</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            text-align: center;
            cursor: pointer;
        }
        #container { max-width: 80%; padding: 40px; }
        h1 { font-size: 2.2rem; font-weight: 400; line-height: 1.6; }
        p { font-size: 1rem; color: #666666; text-transform: uppercase; letter-spacing: 0.2em; margin-top: 30px; }
        .fade-in { animation: fadeIn 0.8s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body onclick="getQuote()">

    <div id="container">
        <h1 id="quote">"Loading..."</h1>
        <p id="author"></p>
    </div>

    <script>
        // BACKUP LIST: Used if offline or no keywords found
        const localQuotes = [
            { q: "Discipline is the bridge between goals and accomplishment.", a: "Jim Rohn" },
            { q: "Success is the sum of small efforts, repeated day-in and day-out.", a: "Robert Collier" },
            { q: "We are what we repeatedly do. Excellence, then, is not an act, but a habit.", a: "Aristotle" },
            { q: "The secret of your future is hidden in your daily routine.", a: "Mike Murdock" },
            { q: "Hard work beats talent when talent doesn't work hard.", a: "Tim Notke" }
        ];

        const keywords = ["discipline", "work", "success", "habit", "persist", "action", "do", "grit", "focus"];

        async function getQuote() {
            const quoteEl = document.getElementById('quote');
            const authorEl = document.getElementById('author');
            const container = document.getElementById('container');

            // 1. Check if we are online
            if (navigator.onLine) {
                try {
                    const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://zenquotes.io/api/random'), { signal: AbortSignal.timeout(3000) });
                    const data = await response.json();
                    const quoteData = JSON.parse(data.contents)[0];
                    
                    const text = quoteData.q.toLowerCase();
                    const hasKeyword = keywords.some(word => text.includes(word));

                    if (hasKeyword) {
                        displayQuote(quoteData.q, quoteData.a);
                        return; // Exit function if internet quote is good
                    }
                } catch (e) {
                    console.log("Internet fetch failed or timed out, switching to local.");
                }
            }

            // 2. Fallback to Local List (if offline, timeout, or no keyword match)
            const randomLocal = localQuotes[Math.floor(Math.random() * localQuotes.length)];
            displayQuote(randomLocal.q, randomLocal.a);
        }

        function displayQuote(q, a) {
            const container = document.getElementById('container');
            document.getElementById('quote').innerText = `"${q}"`;
            document.getElementById('author').innerText = `— ${a}`;
            
            container.classList.remove('fade-in');
            void container.offsetWidth; 
            container.classList.add('fade-in');
        }

        window.onload = getQuote;
    </script>
</body>
</html>
